services:
  nest-bp:
    container_name: nest-bp
    restart: unless-stopped
    build: .
    image: nest-bp
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_URL=postgres://postgres:postgres@nest-bp_pgsql:5432/nest-bp
      - REDIS_URL=redis://nest-bp_redis:6379
  postgres:
    # 18.3
    image: postgres@sha256:a9abf4275f9e99bff8e6aed712b3b7dfec9cac1341bba01c1ffdfce9ff9fc34a
    container_name: nest-bp_pgsql
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=nest-bp
    volumes:
      - nest-bp-data:/var/lib/postgresql
  redis:
    # 8.8.0
    image: redis@sha256:2838d5524559494f6f1cd66e97e76b200d64a633a8614200620755ed395daf32
    container_name: nest-bp_redis
    restart: unless-stopped
volumes:
  nest-bp-data:
